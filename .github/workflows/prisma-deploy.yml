name: CI — build, prisma migrate & seed

on:
  push:
    branches: [ main ]

jobs:
  build-and-migrate:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: '--max-old-space-size=2048'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Require DATABASE_URL secret
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "ERROR: DATABASE_URL secret is not set. Add it to repository or environment secrets before running this workflow." >&2
            echo "See https://docs.github.com/en/actions/security-guides/encrypted-secrets for how to add secrets." >&2
            exit 1
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Generate Prisma client (Postgres schema)
        if: ${{ github.ref == 'refs/heads/main' }}
        run: npx prisma generate --schema=prisma/schema.postgres.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run Prisma migrations (deploy)
        if: ${{ github.ref == 'refs/heads/main' }}
        run: npx prisma migrate deploy --schema=prisma/schema.postgres.prisma
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Seed database (optional)
        if: ${{ github.ref == 'refs/heads/main' }}
        run: node prisma/seed.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Require JWT_SECRET secret
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          if [ -z "$JWT_SECRET" ]; then
            echo "ERROR: JWT_SECRET secret is not set. Add it to repository or environment secrets before running this workflow." >&2
            echo "See https://docs.github.com/en/actions/security-guides/encrypted-secrets for how to add secrets." >&2
            exit 1
          fi
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Build Next.js
        if: ${{ github.ref == 'refs/heads/main' }}
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Upload artifact (build)
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
